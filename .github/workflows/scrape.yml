name: scrape-bmw-techworks-ro

on:
  schedule:
    - cron: '0 6 * * 1'      # Weekly: Monday 6AM UTC
  workflow_dispatch:          # Manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run scrape
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}
